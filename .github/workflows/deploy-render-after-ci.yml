name: Deploy Render API (After CI)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-render-api-after-ci
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render Deploy Hook
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Validate deploy hook secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing required secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger deploy
        run: |
          curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Confirm trigger
        run: echo "Render deploy hook triggered successfully after CI."
