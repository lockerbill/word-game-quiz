name: Deploy Railway API (After CI)

on:
  workflow_dispatch:

concurrency:
  group: deploy-railway-api-after-ci
  cancel-in-progress: true

jobs:
  deploy:
    name: Run migrations, seed, and deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Validate Railway secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Missing required secret: RAILWAY_TOKEN"
            exit 1
          fi

          if [ -z "${{ secrets.RAILWAY_PROJECT_ID }}" ]; then
            echo "Missing required secret: RAILWAY_PROJECT_ID"
            exit 1
          fi

          if [ -z "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" ]; then
            echo "Missing required secret: RAILWAY_ENVIRONMENT_ID"
            exit 1
          fi

          if [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            echo "Missing required secret: RAILWAY_SERVICE_ID"
            exit 1
          fi

      - name: Install server dependencies
        run: npm ci

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link Railway project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}"

      - name: Run production migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}" \
            npm run migration:run

      - name: Run production seed
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NODE_ENV: production
        run: |
          railway run \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}" \
            npm run seed:run

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up . \
            --ci \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID }}"
