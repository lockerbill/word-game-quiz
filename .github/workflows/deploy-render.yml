name: Deploy Render API

on:
  workflow_dispatch:

concurrency:
  group: deploy-render-api
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render Deploy Hook
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing required secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger deploy
        run: |
          curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Confirm trigger
        run: echo "Render deploy hook triggered successfully."
